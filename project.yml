name: Praxis
options:
  bundleIdPrefix: com.pierretranchand
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  ArgmaxOSSSwift:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: 1.0.0
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    # Pinned instead of `branch: main`: main is a moving target with no release tags,
    # and a commit fetched fresh by CI (fd0f13b…) broke on a real upstream compile error
    # (DType.greatestFiniteMagnitudeArray missing) that isn't present in this revision,
    # the one actually verified building locally. Bump deliberately, not by drifting.
    revision: 2c1dd13d41586f63f40ba9ce45ce201026ab52b0
  # Was only a transitive dependency of MLXSwiftLM until here — declared explicitly to
  # import the `MLX` product directly (Memory.cacheLimit, for the GPU cache cap in
  # LocalLLMCoordinator). `exactVersion: 0.31.6` (matching Package.resolved at the time)
  # broke CI: mlx-swift >= 0.31.5 declares swift-tools-version 6.3.0, which the runner's
  # Xcode rejected as "incompatible", and an exact pin gives the resolver no version to
  # fall back to. A floor instead of an exact pin lets it settle on whatever's actually
  # compatible on a given toolchain, same as it already did when this was only a
  # transitive dependency (before this explicit entry existed).
  MLXSwift:
    url: https://github.com/ml-explore/mlx-swift
    from: 0.30.0
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.0.0
  SwiftJinja:
    url: https://github.com/huggingface/swift-jinja
    exactVersion: 2.0.0
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.8.1

targets:
  Praxis:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Praxis/App
      - path: Praxis/Audio
      - path: Praxis/Storage
      - path: Praxis/Transcription
      - path: Praxis/AI
      - path: Praxis/Tasks
      - path: Praxis/Resources/Assets.xcassets
    info:
      path: Praxis/Resources/Info.plist
      properties:
        # Without these, xcodegen bakes literal "1.0"/"1" into the generated Info.plist
        # (its own default when these keys aren't listed here) — every `xcodegen
        # generate` was silently clobbering the $(MARKETING_VERSION) placeholder back to
        # a hardcoded value, which is why the installed app kept showing "1.0" no matter
        # what MARKETING_VERSION said below.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSMicrophoneUsageDescription: "Praxis a besoin d'accéder au micro pour enregistrer et transcrire vos cours."
        LSApplicationCategoryType: "public.app-category.productivity"
    settings:
      base:
        # WhisperKit's streaming API (AudioStreamTranscriber) isn't fully Sendable-annotated yet;
        # Swift 6 strict concurrency rejects passing its protocol-typed init args across actor
        # isolation. Swift 5 language mode keeps our own actors/async code but checks leniently.
        SWIFT_VERSION: 5.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.pierretranchand.Praxis
        MARKETING_VERSION: "0.1.0-alpha.1"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: ArgmaxOSSSwift
        product: WhisperKit
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: MLXSwift
        product: MLX
      - package: SwiftTransformers
        product: Tokenizers
      - package: SwiftHuggingFace
        product: HuggingFace

  PraxisSmokeTest:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PraxisSmokeTest
    settings:
      base:
        SWIFT_VERSION: 6.0
        PRODUCT_BUNDLE_IDENTIFIER: com.pierretranchand.PraxisSmokeTest
    dependencies:
      - package: ArgmaxOSSSwift
        product: WhisperKit

  PraxisLLMBench:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PraxisLLMBench
    settings:
      base:
        SWIFT_VERSION: 5.0
        PRODUCT_BUNDLE_IDENTIFIER: com.pierretranchand.PraxisLLMBench
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftTransformers
        product: Tokenizers
      - package: SwiftHuggingFace
        product: HuggingFace
