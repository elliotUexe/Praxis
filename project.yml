name: Praxis
options:
  bundleIdPrefix: com.pierretranchand
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  ArgmaxOSSSwift:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: 1.0.0
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.0.0
  SwiftJinja:
    url: https://github.com/huggingface/swift-jinja
    exactVersion: 2.0.0
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.8.1

targets:
  Praxis:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Praxis/App
      - path: Praxis/Audio
      - path: Praxis/Storage
      - path: Praxis/Transcription
      - path: Praxis/AI
      - path: Praxis/Tasks
      - path: Praxis/Resources/Assets.xcassets
    info:
      path: Praxis/Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Praxis a besoin d'accéder au micro pour enregistrer et transcrire vos cours."
        LSApplicationCategoryType: "public.app-category.productivity"
    settings:
      base:
        # WhisperKit's streaming API (AudioStreamTranscriber) isn't fully Sendable-annotated yet;
        # Swift 6 strict concurrency rejects passing its protocol-typed init args across actor
        # isolation. Swift 5 language mode keeps our own actors/async code but checks leniently.
        SWIFT_VERSION: 5.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.pierretranchand.Praxis
        MARKETING_VERSION: "0.1.0-alpha.1"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: ArgmaxOSSSwift
        product: WhisperKit
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftTransformers
        product: Tokenizers
      - package: SwiftHuggingFace
        product: HuggingFace

  PraxisSmokeTest:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PraxisSmokeTest
    settings:
      base:
        SWIFT_VERSION: 6.0
        PRODUCT_BUNDLE_IDENTIFIER: com.pierretranchand.PraxisSmokeTest
    dependencies:
      - package: ArgmaxOSSSwift
        product: WhisperKit

  PraxisLLMBench:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PraxisLLMBench
    settings:
      base:
        SWIFT_VERSION: 5.0
        PRODUCT_BUNDLE_IDENTIFIER: com.pierretranchand.PraxisLLMBench
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftTransformers
        product: Tokenizers
      - package: SwiftHuggingFace
        product: HuggingFace
