name: Release

# Triggered by pushing a tag like "v0.2.0" (see README.md "Publier une release" for the
# exact commands). Builds Praxis in Release configuration, zips the .app, and publishes it
# as a GitHub Release — this is what UpdateCheckCoordinator polls at launch.
#
# Known risk: this dependency chain (WhisperKit, mlx-swift-lm, swift-transformers,
# swift-jinja pinned to 2.0.0 — see project.yml comments) was genuinely fiddly to get
# building even locally in Xcode. The first run of this workflow on a fresh GitHub runner
# may fail for reasons that never showed up locally (different default Xcode version,
# missing Metal toolchain component, SPM plugin trust). Check the Actions log and adjust
# the `xcode-select` step or add `xcodebuild -downloadComponent MetalToolchain` if needed.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-and-release:
    # mlx-swift-lm (branch: main, a moving target — see project.yml) currently requires
    # Swift tools 6.1, which needs Xcode 16.3+. macos-14 tops out at Xcode 16.2 (Swift
    # 6.0) and fails to resolve packages; macos-15 ships newer Xcode versions.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select newest available Xcode
        # Picks the highest-numbered Xcode_*.app on the runner instead of a hardcoded
        # version, since GitHub bumps these images' available versions over time and a
        # pinned number silently goes stale (see git history of this file for two
        # examples of exactly that).
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Install xcodegen
        # The macos-14 runner image ships with unrelated third-party taps (e.g. aws/tap)
        # already tapped. Recent Homebrew refuses ANY operation while an untrusted tap is
        # present, even one unrelated to what's being installed (exit code 74 with a "taps
        # are not trusted" warning). Disabling the check is safe here: this is a fresh,
        # ephemeral CI runner, not a persistent machine.
        run: brew install xcodegen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift package dependencies
        # Same plugin-trust prompt that requires clicking "Trust & Enable" in Xcode.app
        # locally (mlx-swift-lm ships a build-tool plugin) — these flags are the headless
        # CI equivalent, needed here too, not just on the actual `build` step below.
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Praxis.xcodeproj \
            -scheme Praxis \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Build Praxis (Release, ad-hoc signed)
        # MARKETING_VERSION is overridden from the pushed tag itself, not read from
        # project.yml — otherwise a build's self-reported version can permanently drift
        # from the tag that shipped it, and UpdateCheckCoordinator's version compare
        # never converges to "up to date" even right after installing that exact build.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild \
            -project Praxis.xcodeproj \
            -scheme Praxis \
            -configuration Release \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -derivedDataPath build \
            MARKETING_VERSION="$VERSION" \
            build

      - name: Create .dmg
        run: |
          APP_PATH="build/Build/Products/Release/Praxis.app"
          STAGING="dmg-staging"
          mkdir -p dist "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Praxis" -srcfolder "$STAGING" -ov -format UDZO \
            "dist/Praxis-${{ github.ref_name }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
